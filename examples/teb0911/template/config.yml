---
name: teb0911_template
board: boards/trenz/teb0911/9eg
version: 0.1.1

cores:
  - fpga/cores/axi_ctl_register_v1_0
  - fpga/cores/axi_sts_register_v1_0
  - fpga/cores/dna_reader_v1_0

memory:
  - name: control
    offset: '0xA4001000'
    range: 4K
  - name: status
    offset: '0xA4002000'
    range: 4K
  - name: system_management_wiz
    offset: '0xA4003000'
    range: 4K

control_registers:
  - led

status_registers:
  - forty_two
  - clock[nclk]

parameters:
  fclk0: 250000000 # FPGA clock speed in Hz
  nclk: 6 # FPGA clock speed in Hz

xdc:
  - boards/trenz/teb0911/9eg/config/ports.xdc 
  - ./constraints.xdc

drivers:
  - server/drivers/common.hpp
  - ./led_blinker.hpp

web:
  - ./web/index.html
  - web/koheron.ts
  - web/led-blinker.ts
  - ./web/app.ts
   web/main.css
